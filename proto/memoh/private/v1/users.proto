syntax = "proto3";

package memoh.private.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "memoh/private/v1/common.proto";

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/private/v1;privatev1";

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  string display_name = 5;
  string avatar_url = 6;
  string timezone = 7;
  bool is_active = 8;
  google.protobuf.Struct metadata = 9;
  AuditFields audit = 10;
}

message UserIdentity {
  string id = 1;
  string user_id = 2;
  string channel = 3;
  string external_id = 4;
  string display_name = 5;
  google.protobuf.Struct metadata = 6;
  AuditFields audit = 7;
}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  User user = 1;
}

message UpdateCurrentUserRequest {
  optional string email = 1;
  optional string display_name = 2;
  optional string avatar_url = 3;
  optional string timezone = 4;
  google.protobuf.Struct metadata = 5;
}

message UpdateCurrentUserResponse {
  User user = 1;
}

message UpdateCurrentUserPasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message UpdateCurrentUserPasswordResponse {}

message ListMyIdentitiesRequest {}

message ListMyIdentitiesResponse {
  repeated UserIdentity identities = 1;
}

message ListUsersRequest {
  PageRequest page = 1;
  string query = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  PageResponse page = 2;
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string role = 4;
  string display_name = 5;
  string timezone = 6;
  bool is_active = 7;
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string id = 1;
  optional string email = 2;
  optional string role = 3;
  optional string display_name = 4;
  optional string avatar_url = 5;
  optional string timezone = 6;
  optional bool is_active = 7;
  google.protobuf.Struct metadata = 8;
}

message UpdateUserResponse {
  User user = 1;
}

message ResetUserPasswordRequest {
  string id = 1;
  string new_password = 2;
}

message ResetUserPasswordResponse {}

service UserService {
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
  rpc UpdateCurrentUser(UpdateCurrentUserRequest) returns (UpdateCurrentUserResponse);
  rpc UpdateCurrentUserPassword(UpdateCurrentUserPasswordRequest) returns (UpdateCurrentUserPasswordResponse);
  rpc ListMyIdentities(ListMyIdentitiesRequest) returns (ListMyIdentitiesResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc ResetUserPassword(ResetUserPasswordRequest) returns (ResetUserPasswordResponse);
}
