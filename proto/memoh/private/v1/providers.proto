syntax = "proto3";

package memoh.private.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "memoh/private/v1/common.proto";

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/private/v1;privatev1";

message Provider {
  string id = 1;
  string name = 2;
  string display_name = 3;
  string base_url = 4;
  string client_type = 5;
  bool enabled = 6;
  google.protobuf.Struct config = 7;
  AuditFields audit = 8;
}

message ProviderModelSummary {
  string id = 1;
  string provider_id = 2;
  string model_id = 3;
  string display_name = 4;
  string type = 5;
  repeated string modalities = 6;
  google.protobuf.Struct metadata = 7;
}

message CreateProviderRequest {
  string name = 1;
  string display_name = 2;
  string base_url = 3;
  string api_key = 4;
  string client_type = 5;
  bool enabled = 6;
  google.protobuf.Struct config = 7;
}

message CreateProviderResponse {
  Provider provider = 1;
}

message ListProvidersRequest {
  PageRequest page = 1;
}

message ListProvidersResponse {
  repeated Provider providers = 1;
  PageResponse page = 2;
}

message GetProviderRequest {
  string id = 1;
  string name = 2;
}

message GetProviderResponse {
  Provider provider = 1;
}

message UpdateProviderRequest {
  string id = 1;
  optional string display_name = 2;
  optional string base_url = 3;
  optional string api_key = 4;
  optional string client_type = 5;
  optional bool enabled = 6;
  google.protobuf.Struct config = 7;
}

message UpdateProviderResponse {
  Provider provider = 1;
}

message DeleteProviderRequest {
  string id = 1;
}

message DeleteProviderResponse {}

message CountProvidersRequest {}

message CountProvidersResponse {
  int64 count = 1;
}

message ListProviderModelsRequest {
  string provider_id = 1;
  PageRequest page = 2;
}

message ListProviderModelsResponse {
  repeated ProviderModelSummary models = 1;
  PageResponse page = 2;
}

message TestProviderRequest {
  string id = 1;
  string model_id = 2;
}

message TestProviderResponse {
  bool ok = 1;
  string message = 2;
  google.protobuf.Struct metadata = 3;
}

message ImportProviderModelsRequest {
  string id = 1;
  repeated string model_ids = 2;
  bool dry_run = 3;
}

message ImportProviderModelsResponse {
  repeated ProviderModelSummary models = 1;
}

message GetProviderOauthStatusRequest {
  string provider_id = 1;
}

message GetProviderOauthStatusResponse {
  bool authorized = 1;
  string account = 2;
  google.protobuf.Struct metadata = 3;
}

message StartProviderOauthRequest {
  string provider_id = 1;
  string redirect_uri = 2;
}

message StartProviderOauthResponse {
  string authorize_url = 1;
  string state = 2;
}

message PollProviderOauthRequest {
  string provider_id = 1;
  string state = 2;
}

message PollProviderOauthResponse {
  bool complete = 1;
  GetProviderOauthStatusResponse status = 2;
}

message RevokeProviderOauthRequest {
  string provider_id = 1;
}

message RevokeProviderOauthResponse {}

message AuthorizeProviderOauthRequest {
  string provider_id = 1;
  string redirect_uri = 2;
  repeated string scopes = 3;
}

message AuthorizeProviderOauthResponse {
  string authorize_url = 1;
  string state = 2;
}

message ExchangeProviderOauthTokenRequest {
  string provider_id = 1;
  string code = 2;
  string state = 3;
  string redirect_uri = 4;
}

message ExchangeProviderOauthTokenResponse {
  bool authorized = 1;
  string account = 2;
  google.protobuf.Timestamp expires_at = 3;
  google.protobuf.Struct metadata = 4;
}

message GetProviderOauthTokenRequest {
  string provider_id = 1;
}

message GetProviderOauthTokenResponse {
  bool available = 1;
  string token_type = 2;
  google.protobuf.Timestamp expires_at = 3;
  repeated string scopes = 4;
}

service ProviderService {
  rpc CreateProvider(CreateProviderRequest) returns (CreateProviderResponse);
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc GetProvider(GetProviderRequest) returns (GetProviderResponse);
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse);
  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse);
  rpc CountProviders(CountProvidersRequest) returns (CountProvidersResponse);
  rpc ListProviderModels(ListProviderModelsRequest) returns (ListProviderModelsResponse);
  rpc TestProvider(TestProviderRequest) returns (TestProviderResponse);
  rpc ImportProviderModels(ImportProviderModelsRequest) returns (ImportProviderModelsResponse);
  rpc GetProviderOauthStatus(GetProviderOauthStatusRequest) returns (GetProviderOauthStatusResponse);
  rpc StartProviderOauth(StartProviderOauthRequest) returns (StartProviderOauthResponse);
  rpc PollProviderOauth(PollProviderOauthRequest) returns (PollProviderOauthResponse);
  rpc RevokeProviderOauth(RevokeProviderOauthRequest) returns (RevokeProviderOauthResponse);
  rpc AuthorizeProviderOauth(AuthorizeProviderOauthRequest) returns (AuthorizeProviderOauthResponse);
  rpc ExchangeProviderOauthToken(ExchangeProviderOauthTokenRequest) returns (ExchangeProviderOauthTokenResponse);
  rpc GetProviderOauthToken(GetProviderOauthTokenRequest) returns (GetProviderOauthTokenResponse);
}
