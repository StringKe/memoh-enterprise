name: Vite+

on:
  push:
    branches: ["main"]
    paths:
      - "apps/**/*.js"
      - "apps/**/*.cjs"
      - "apps/**/*.mjs"
      - "apps/**/*.ts"
      - "apps/**/*.tsx"
      - "apps/**/*.vue"
      - "packages/**/*.js"
      - "packages/**/*.ts"
      - "packages/**/*.tsx"
      - "packages/**/*.vue"
      - "proto/**/*.proto"
      - "buf.gen.ts.yaml"
      - "buf.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/vite-plus.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/**/*.js"
      - "apps/**/*.cjs"
      - "apps/**/*.mjs"
      - "apps/**/*.ts"
      - "apps/**/*.tsx"
      - "apps/**/*.vue"
      - "packages/**/*.js"
      - "packages/**/*.ts"
      - "packages/**/*.tsx"
      - "packages/**/*.vue"
      - "proto/**/*.proto"
      - "buf.gen.ts.yaml"
      - "buf.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/vite-plus.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Run Vite+ check
        run: vp check
