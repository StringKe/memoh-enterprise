syntax = "proto3";

package memoh.private.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/private/v1;privatev1";

message CurrentUser {
  string id = 1;
  string username = 2;
  string email = 3;
  string display_name = 4;
  string avatar_url = 5;
  string timezone = 6;
  bool is_active = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string token_type = 2;
  google.protobuf.Timestamp expires_at = 3;
  string user_id = 4;
  string session_id = 5;
  string display_name = 6;
  string username = 7;
  string timezone = 8;
}

message GetMeRequest {}

message GetMeResponse {
  CurrentUser user = 1;
}

message RefreshRequest {}

message RefreshResponse {
  string access_token = 1;
  string token_type = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message LogoutRequest {}

message LogoutResponse {}

message ExchangeSsoCodeRequest {
  string code = 1;
}

message ExchangeSsoCodeResponse {
  LoginResponse login = 1;
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetMe(GetMeRequest) returns (GetMeResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc ExchangeSsoCode(ExchangeSsoCodeRequest) returns (ExchangeSsoCodeResponse);
}
