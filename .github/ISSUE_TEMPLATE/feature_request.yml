name: Feature Request
description: Propose a Memoh Enterprise backend or runtime feature
title: "[Feature]: "
labels: ["feat"]
body:
  - type: markdown
    attributes:
      value: |
        Keep requests within Memoh Enterprise scope: backend APIs, non-interactive CLI, PostgreSQL, Docker Engine/containerd/Kubernetes runtimes, Browser Gateway, agent tools, providers, models, channels, email, memory, and scheduling. Desktop, bundled Web GUI, TUI, SQLite, Windows, Docker Hub publishing, npmjs publishing, and China-specific optimizations are out of scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the operational or enterprise backend problem this solves.
      placeholder: What is blocked today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API, CLI, runtime, or service behavior you want.
      placeholder: What should Memoh Enterprise do?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server / REST API
        - CLI
        - PostgreSQL / migrations
        - Docker Engine runtime
        - containerd runtime
        - Kubernetes runtime
        - Browser Gateway
        - Agent tools
        - Channel adapter
        - Provider / model
        - Other backend component
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List concrete behavior that must be true when implemented.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
