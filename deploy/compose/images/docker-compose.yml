name: "memoh"
services:
  migrate:
    image: ghcr.io/stringke/server:${SERVER_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.server
      args:
        - VERSION=${MEMOH_VERSION:-dev}
        - COMMIT_HASH=${MEMOH_COMMIT:-unknown}
        - BUILD_TIME=${MEMOH_BUILD_TIME:-unknown}

  server:
    image: ghcr.io/stringke/server:${SERVER_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.server
      args:
        - VERSION=${MEMOH_VERSION:-dev}
        - COMMIT_HASH=${MEMOH_COMMIT:-unknown}
        - BUILD_TIME=${MEMOH_BUILD_TIME:-unknown}

  web:
    image: ghcr.io/stringke/web:${WEB_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.web
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_CONNECT_URL=${VITE_CONNECT_URL:-/connect}

  sparse:
    image: ghcr.io/stringke/sparse:${SPARSE_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.sparse

  browser:
    image: ghcr.io/stringke/browser:${BROWSER_TAG:-local}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.browser
