experimental_monorepo_root = true

[monorepo]
config_roots = ["cmd/agent"]

[tools]
# Go version from go.mod
go = "1.26"
# Node.js for frontend packages
node = "24"
# Bun for browser gateway
bun = "latest"
# pnpm for the workspace lockfile used by Vite+
# 走 npm backend 而非 aqua：aqua registry 假定 asset 命名为 pnpm-darwin-arm64.tar.gz，
# 实际 pnpm release 命名为 pnpm-macos-arm64，aqua 在 macOS arm64 上必失败
"npm:pnpm" = "10"
# sqlc for sql management
sqlc = "latest"
# protobuf and ConnectRPC generation
buf = "latest"
# golangci-lint for Go linting
"golangci-lint" = "2.12.2"

[task_config]
dir = "{{cwd}}"

[settings]
experimental = true

[tasks.pnpm-install]
description = "Install dependencies"
env = { CI = "true" }
run = "vp install"

[tasks.docs]
description = "start documentation"
run = "vp run --filter @stringke/docs dev"

[tasks."web:dev"]
description = "Start web management UI development server"
depends = [
  "//:sdk-generate",
]
run = "vp run --filter @stringke/web dev"

[tasks."web:build"]
description = "Build web management UI"
depends = [
  "//:sdk-generate",
]
run = "vp run --filter @stringke/web build"

[tasks."web:start"]
description = "Start web management UI preview server"
depends = [
  "//:sdk-generate",
]
run = "vp run --filter @stringke/web start"

[tasks.go-install]
description = "Install Go dependencies"
run = "go mod download"

[tasks.sdk-generate]
description = "Generate ConnectRPC TypeScript SDK"
depends = [
  "//:pnpm-install",
]
run = "vp run proto:generate:ts"

[tasks.proto-lint]
description = "Lint protobuf contracts"
run = "vp run proto:lint"

[tasks.proto-generate]
description = "Generate Go and TypeScript protobuf/Connect artifacts"
depends = [
  "//:pnpm-install",
]
run = "vp run proto:generate"

[tasks."proto-generate:go"]
description = "Generate Go protobuf/Connect artifacts"
run = "vp run proto:generate:go"

[tasks."proto-generate:ts"]
description = "Generate TypeScript protobuf/Connect artifacts"
depends = [
  "//:pnpm-install",
]
run = "vp run proto:generate:ts"

[tasks.sqlc-generate]
description = "Generate SQL code"
run = "sqlc generate"

[tasks.dev]
description = "Start development environment"
run = """
#!/bin/bash
set -e
docker compose -f deploy/compose/dev/docker-compose.yml up --build
"""

[tasks."dev:minify"]
description = "Start development environment with minified services"
run = """
#!/bin/bash
set -e
docker compose -f deploy/compose/dev/docker-compose.minify.yml up --build
"""

[tasks."dev:infra"]
description = "Start local development infrastructure for host-run server"
run = """
#!/bin/bash
set -e
docker compose -f deploy/compose/dev/docker-compose.yml up --build -d postgres qdrant sparse
"""

[tasks."dev:selinux"]
description = "Start development environment on SELinux systems"
run = """
#!/bin/bash
set -e
docker compose -f deploy/compose/dev/docker-compose.yml -f deploy/compose/dev/docker-compose.selinux.yml up --build
"""

[tasks."dev:down"]
description = "Stop development environment"
run = "docker compose -f deploy/compose/dev/docker-compose.yml down --remove-orphans"

[tasks."dev:down:selinux"]
description = "Stop development environment on SELinux systems"
run = "docker compose -f deploy/compose/dev/docker-compose.yml -f deploy/compose/dev/docker-compose.selinux.yml down --remove-orphans"

[tasks."dev:logs"]
description = "View development logs"
run = "docker compose -f deploy/compose/dev/docker-compose.yml logs -f"

[tasks."dev:logs:selinux"]
description = "View development logs on SELinux systems"
run = "docker compose -f deploy/compose/dev/docker-compose.yml -f deploy/compose/dev/docker-compose.selinux.yml logs -f"

[tasks."dev:restart"]
description = "Restart a service (usage: mise run dev:restart -- server)"
run = "docker compose -f deploy/compose/dev/docker-compose.yml restart $@"

[tasks."dev:restart:selinux"]
description = "Restart a service on SELinux systems (usage: mise run dev:restart:selinux -- server)"
run = "docker compose -f deploy/compose/dev/docker-compose.yml -f deploy/compose/dev/docker-compose.selinux.yml restart $@"

[tasks."local:dev"]
description = "Start infrastructure and run the server on the host"
run = """
#!/bin/bash
set -euo pipefail

docker compose -f deploy/compose/dev/docker-compose.yml up --build -d postgres qdrant sparse

TEMPLATE_CONFIG="${MEMOH_LOCAL_CONFIG_TEMPLATE:-conf/app.local.toml}"
GENERATED_CONFIG="${CONFIG_PATH:-data/local/config.toml}"
RUNTIME_DIR="${MEMOH_LOCAL_RUNTIME_DIR:-data/runtime}"
PROJECT_ROOT="$(pwd)"

mkdir -p data/local "$RUNTIME_DIR"
go build -o "$RUNTIME_DIR/workspace-executor" ./cmd/workspace-executor
sed "s|__PROJECT_ROOT__|$PROJECT_ROOT|g" "$TEMPLATE_CONFIG" > "$GENERATED_CONFIG"

if [ -d ".toolkit" ]; then
  rm -rf "$RUNTIME_DIR/toolkit"
  mkdir -p "$RUNTIME_DIR/toolkit"
  cp -a .toolkit/. "$RUNTIME_DIR/toolkit/"
else
  echo "warning: .toolkit not found; Docker workspaces will run without bundled node/uv tools." >&2
  echo "         Run 'mise run install-workspace-toolkit' to install them." >&2
fi

CONFIG_PATH="$GENERATED_CONFIG" go run ./cmd/agent migrate up
CONFIG_PATH="$GENERATED_CONFIG" go run ./cmd/agent serve
"""

[tasks."local:browser"]
description = "Start Browser Gateway on the host against local development config"
run = """
#!/bin/bash
set -euo pipefail
CONFIG_PATH="$(pwd)/conf/app.local.toml" vp run --filter @stringke/browser-gateway dev
"""

[tasks."workspace-executor:build"]
description = "Manually rebuild workspace-executor binary in dev container (normally auto-triggered by air)"
run = """
#!/bin/bash
set -e
docker compose -f deploy/compose/dev/docker-compose.yml exec server \
  sh -c 'cd /workspace && sh scripts/dev/workspace-executor-build.sh'
"""

[tasks."workspace-executor:build:selinux"]
description = "Manually rebuild workspace-executor binary in SELinux dev container"
run = """
#!/bin/bash
set -e
docker compose -f deploy/compose/dev/docker-compose.yml -f deploy/compose/dev/docker-compose.selinux.yml exec server \
  sh -c 'cd /workspace && sh scripts/dev/workspace-executor-build.sh'
"""

[tasks.db-up]
description = "Initialize and Migrate Database"
run = "scripts/db/up.sh"

[tasks.db-down]
description = "Drop Database"
run = "scripts/db/drop.sh"

[tasks."e2e:smoke"]
description = "Run endpoint smoke tests against a running deployment"
run = "scripts/e2e/smoke.sh --browser"

[tasks.release]
description = "Release new version"
run = "vp run release"

[tasks.build-unified]
description = "Build memoh CLI locally"
run = "go build -o bin/memoh ./cmd/memoh"

[tasks.install-socktainer]
description = "Install socktainer"
run = "brew tap socktainer/tap && brew install socktainer"

[tasks.install-workspace-toolkit]
description = "Install workspace toolkit"
run = "deploy/docker/toolkit/install.sh .toolkit"

[tasks.lint]
description = "Run all linters"
depends = [
  "//:lint:go",
  "//:lint:es",
]

[tasks."lint:fix"]
description = "Run all linters with auto-fix"
depends = [
  "//:lint:go:fix",
  "//:lint:es:fix",
]

[tasks."lint:go"]
description = "Run Go linter"
run = "env -u GOROOT \"$(mise which golangci-lint)\" run ./..."

[tasks."lint:go:fix"]
description = "Run Go linter with auto-fix"
run = "env -u GOROOT \"$(mise which golangci-lint)\" run --fix ./..."

[tasks."lint:es"]
description = "Run Vite+ check"
run = "vp check"

[tasks."lint:es:fix"]
description = "Run Vite+ check with auto-fix"
run = "vp check --fix"

[tasks.setup]
description = "Setup development environment"
depends = [
  "//:install-workspace-toolkit",
  "//:sqlc-generate",
  "//:pnpm-install",
  "//:go-install",
]
run = """
#!/bin/bash
set -e
echo '✓ Setup complete! Run: mise run dev'
"""
