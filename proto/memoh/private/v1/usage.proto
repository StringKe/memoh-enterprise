syntax = "proto3";

package memoh.private.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "memoh/private/v1/common.proto";

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/private/v1;privatev1";

message TokenUsageSummary {
  string bot_id = 1;
  int64 prompt_tokens = 2;
  int64 completion_tokens = 3;
  int64 total_tokens = 4;
  double estimated_cost = 5;
  string currency = 6;
}

message TokenUsageRecord {
  string id = 1;
  string bot_id = 2;
  string model_id = 3;
  string provider_id = 4;
  int64 prompt_tokens = 5;
  int64 completion_tokens = 6;
  int64 total_tokens = 7;
  double estimated_cost = 8;
  string currency = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Struct metadata = 11;
}

message GetTokenUsageRequest {
  string bot_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

message GetTokenUsageResponse {
  TokenUsageSummary summary = 1;
}

message ListTokenUsageRecordsRequest {
  string bot_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
  PageRequest page = 4;
}

message ListTokenUsageRecordsResponse {
  repeated TokenUsageRecord records = 1;
  PageResponse page = 2;
}

service UsageService {
  rpc GetTokenUsage(GetTokenUsageRequest) returns (GetTokenUsageResponse);
  rpc ListTokenUsageRecords(ListTokenUsageRecordsRequest) returns (ListTokenUsageRecordsResponse);
}
