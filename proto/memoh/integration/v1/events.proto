syntax = "proto3";

package memoh.integration.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/integration/v1;integrationv1";

message IntegrationEvent {
  string event_id = 1;
  string event_type = 2;
  string bot_id = 3;
  string bot_group_id = 4;
  google.protobuf.Timestamp occurred_at = 5;
  oneof payload {
    BotEvent bot = 10;
    SessionEvent session = 11;
    MessageEvent message = 12;
    StatusEvent status = 13;
    TaskEvent task = 14;
    google.protobuf.Struct custom = 15;
  }
}

message BotEvent {
  string bot_id = 1;
  string status = 2;
  google.protobuf.Struct metadata = 3;
}

message SessionEvent {
  string session_id = 1;
  string bot_id = 2;
  string external_session_id = 3;
  string status = 4;
  google.protobuf.Struct metadata = 5;
}

message MessageEvent {
  string message_id = 1;
  string session_id = 2;
  string bot_id = 3;
  string direction = 4;
  string text = 5;
  google.protobuf.Struct metadata = 6;
}

message StatusEvent {
  string subject_type = 1;
  string subject_id = 2;
  string status = 3;
  string message = 4;
  google.protobuf.Struct metadata = 5;
}

message TaskEvent {
  string task_id = 1;
  string bot_id = 2;
  string action_type = 3;
  string status = 4;
  google.protobuf.Struct metadata = 5;
}
