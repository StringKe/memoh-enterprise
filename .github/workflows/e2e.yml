name: E2E

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "apps/browser/**"
      - "apps/web/**"
      - "packages/icons/**"
      - "packages/integration-sdk-ts/**"
      - "packages/sdk/**"
      - "packages/ui/**"
      - "proto/**"
      - "buf.gen.go.yaml"
      - "buf.gen.ts.yaml"
      - "buf.yaml"
      - "deploy/**"
      - "conf/app.docker.toml"
      - "docker-compose.yml"
      - "scripts/e2e/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "apps/browser/**"
      - "apps/web/**"
      - "packages/icons/**"
      - "packages/integration-sdk-ts/**"
      - "packages/sdk/**"
      - "packages/ui/**"
      - "proto/**"
      - "buf.gen.go.yaml"
      - "buf.gen.ts.yaml"
      - "buf.yaml"
      - "deploy/**"
      - "conf/app.docker.toml"
      - "docker-compose.yml"
      - "scripts/e2e/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  BROWSER_CORES: chromium
  BROWSER_TAG: local

jobs:
  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Generate config
        run: |
          cp conf/app.docker.toml config.toml
          openssl genpkey -algorithm Ed25519 -out /tmp/memoh-service-auth.key
          openssl pkey -in /tmp/memoh-service-auth.key -pubout -out /tmp/memoh-service-auth.pub
          python3 - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          def toml_multiline(value: str) -> str:
              return '"""' + value.rstrip("\n") + '\n"""'

          def replace_single_docker_key(text: str, value: str) -> str:
              text, count = re.subn(
                  r'^docker = ""$',
                  f"docker = {toml_multiline(value)}",
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              if count != 1:
                  raise RuntimeError(f"expected exactly one docker placeholder replacement, got {count}")
              return text

          config = Path("config.toml")
          text = config.read_text()
          text = text.replace(
              'bootstrap_token = "CHANGE-ME-INTERNAL-BOOTSTRAP"',
              'bootstrap_token = "E2E-INTERNAL-BOOTSTRAP"',
          )
          text = replace_single_docker_key(text, Path('/tmp/memoh-service-auth.key').read_text())
          text = replace_single_docker_key(text, Path('/tmp/memoh-service-auth.pub').read_text())
          config.write_text(text)
          tomllib.loads(text)
          PY
          echo "MEMOH_INTERNAL_AUTH_BOOTSTRAP_TOKEN=E2E-INTERNAL-BOOTSTRAP" >> "$GITHUB_ENV"

      - name: Build images
        run: |
          docker compose -f deploy/compose/images/docker-compose.yml build server agent-runner connector integration-gateway worker web sparse browser

      - name: Start stack
        run: |
          docker compose --profile qdrant --profile sparse --profile browser up -d

      - name: Smoke test
        run: scripts/e2e/unified-runtime-smoke.sh

      - name: Connect Bot Groups E2E
        run: scripts/e2e/connect-bot-groups.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Integration WebSocket E2E
        run: scripts/e2e/integration-websocket.sh

      - name: REST residual audit
        run: scripts/e2e/rest-residual-audit.sh

      - name: Logs
        if: always()
        run: |
          docker compose --profile qdrant --profile sparse --profile browser logs --no-color --tail=200

      - name: Stop stack
        if: always()
        run: |
          docker compose --profile qdrant --profile sparse --profile browser down -v --remove-orphans
