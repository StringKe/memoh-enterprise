name: Bug Report
description: Report a Memoh Enterprise backend, CLI, container runtime, or Browser Gateway bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Memoh Enterprise supports Linux amd64/arm64 deployments, PostgreSQL, Docker Engine/containerd, backend APIs, non-interactive CLI, and Browser Gateway browser automation. Desktop, bundled Web GUI, TUI, SQLite, Windows, and China-specific deployment paths are out of scope.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the broken behavior and the expected backend behavior.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server / REST API
        - CLI
        - PostgreSQL / migrations
        - Docker Engine runtime
        - containerd runtime
        - Kubernetes runtime
        - Browser Gateway
        - Agent tools
        - Channel adapter
        - Provider / model
        - Other backend component
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Runtime Architecture
      options:
        - linux/amd64
        - linux/arm64
        - macOS local development
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide exact commands, config snippets, and request payloads needed to reproduce.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant server, CLI, container runtime, or Browser Gateway logs.
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version or Commit
      placeholder: v0.8.0 or git SHA
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant Configuration
      description: Paste redacted config.toml sections. Do not include secrets.
      render: toml
    validations:
      required: false
