syntax = "proto3";

package memoh.private.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "memoh/private/v1/common.proto";

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/private/v1;privatev1";

message McpConnection {
  string id = 1;
  string bot_id = 2;
  string name = 3;
  string transport = 4;
  bool enabled = 5;
  google.protobuf.Struct config = 6;
  AuditFields audit = 7;
  string status = 8;
  repeated McpToolDescriptor tools_cache = 9;
  google.protobuf.Timestamp last_probed_at = 10;
  string status_message = 11;
  string auth_type = 12;
}

message McpToolDescriptor {
  string name = 1;
  string description = 2;
  google.protobuf.Struct input_schema = 3;
}

message McpProbeResult {
  bool ok = 1;
  string message = 2;
  repeated string tool_names = 3;
  google.protobuf.Struct metadata = 4;
  repeated McpToolDescriptor tools = 5;
}

message CreateMcpConnectionRequest {
  string bot_id = 1;
  string name = 2;
  string transport = 3;
  bool enabled = 4;
  google.protobuf.Struct config = 5;
}

message CreateMcpConnectionResponse {
  McpConnection connection = 1;
}

message ListMcpConnectionsRequest {
  string bot_id = 1;
  PageRequest page = 2;
}

message ListMcpConnectionsResponse {
  repeated McpConnection connections = 1;
  PageResponse page = 2;
}

message GetMcpConnectionRequest {
  string id = 1;
}

message GetMcpConnectionResponse {
  McpConnection connection = 1;
}

message UpdateMcpConnectionRequest {
  string id = 1;
  optional string name = 2;
  optional string transport = 3;
  optional bool enabled = 4;
  google.protobuf.Struct config = 5;
}

message UpdateMcpConnectionResponse {
  McpConnection connection = 1;
}

message DeleteMcpConnectionRequest {
  string id = 1;
}

message DeleteMcpConnectionResponse {}

message BatchDeleteMcpConnectionsRequest {
  repeated string ids = 1;
}

message BatchDeleteMcpConnectionsResponse {
  int32 deleted_count = 1;
}

message ProbeMcpConnectionRequest {
  string id = 1;
  google.protobuf.Struct config = 2;
}

message ProbeMcpConnectionResponse {
  McpProbeResult result = 1;
}

message ImportMcpConnectionsRequest {
  string bot_id = 1;
  google.protobuf.Struct payload = 2;
}

message ImportMcpConnectionsResponse {
  repeated McpConnection connections = 1;
}

message ExportMcpConnectionsRequest {
  string bot_id = 1;
  repeated string ids = 2;
}

message ExportMcpConnectionsResponse {
  google.protobuf.Struct payload = 1;
}

message DiscoverMcpRequest {
  string bot_id = 1;
  string source = 2;
}

message DiscoverMcpResponse {
  repeated McpConnection connections = 1;
}

message StartMcpOauthRequest {
  string connection_id = 1;
  string redirect_uri = 2;
  string client_id = 3;
  string client_secret = 4;
}

message StartMcpOauthResponse {
  string authorize_url = 1;
  string state = 2;
}

message GetMcpOauthStatusRequest {
  string connection_id = 1;
}

message GetMcpOauthStatusResponse {
  bool authorized = 1;
  string account = 2;
  google.protobuf.Struct metadata = 3;
}

message RevokeMcpOauthRequest {
  string connection_id = 1;
}

message RevokeMcpOauthResponse {}

message ExchangeMcpOauthRequest {
  string code = 1;
  string state = 2;
}

message ExchangeMcpOauthResponse {
  bool success = 1;
}

service McpService {
  rpc CreateMcpConnection(CreateMcpConnectionRequest) returns (CreateMcpConnectionResponse);
  rpc ListMcpConnections(ListMcpConnectionsRequest) returns (ListMcpConnectionsResponse);
  rpc GetMcpConnection(GetMcpConnectionRequest) returns (GetMcpConnectionResponse);
  rpc UpdateMcpConnection(UpdateMcpConnectionRequest) returns (UpdateMcpConnectionResponse);
  rpc DeleteMcpConnection(DeleteMcpConnectionRequest) returns (DeleteMcpConnectionResponse);
  rpc BatchDeleteMcpConnections(BatchDeleteMcpConnectionsRequest) returns (BatchDeleteMcpConnectionsResponse);
  rpc ProbeMcpConnection(ProbeMcpConnectionRequest) returns (ProbeMcpConnectionResponse);
  rpc ImportMcpConnections(ImportMcpConnectionsRequest) returns (ImportMcpConnectionsResponse);
  rpc ExportMcpConnections(ExportMcpConnectionsRequest) returns (ExportMcpConnectionsResponse);
  rpc DiscoverMcp(DiscoverMcpRequest) returns (DiscoverMcpResponse);
  rpc StartMcpOauth(StartMcpOauthRequest) returns (StartMcpOauthResponse);
  rpc GetMcpOauthStatus(GetMcpOauthStatusRequest) returns (GetMcpOauthStatusResponse);
  rpc RevokeMcpOauth(RevokeMcpOauthRequest) returns (RevokeMcpOauthResponse);
  rpc ExchangeMcpOauth(ExchangeMcpOauthRequest) returns (ExchangeMcpOauthResponse);
}
