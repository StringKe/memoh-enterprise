## Service configuration
[log]
level = "info"
format = "text"

[server]
addr = "server:8080"

## Admin
[admin]
username = "admin"
password = "admin123"
email = "admin@memoh.local"

## Auth configuration
[auth]
jwt_secret = "YZq8kXrW5dFpNt9mLxQvHbRjKsMnOePw"
jwt_expires_in = "168h"

timezone = "UTC"

[internal_auth]
active_key_id = "docker"
bootstrap_token = "CHANGE-ME-INTERNAL-BOOTSTRAP"

[internal_auth.private_keys]
docker = ""

[internal_auth.public_keys]
docker = ""

[internal_auth.previous_public_keys]

[internal_services]
agent_runner_addr = "http://agent-runner:26813"
connector_addr = "connector"
integration_gateway_addr = "http://integration-gateway:26815"
worker_name = "worker"

[database]
# PostgreSQL is the only supported relational database backend.
driver = "postgres"

[container]
# Docker Compose deployment uses the server image's embedded containerd. Do not
# change this to "docker" inside Compose unless you also provide host-valid
# runtime bind mounts and Docker socket access.
backend = "containerd"
default_image = "debian:bookworm-slim"
image_pull_policy = "if_not_present"
# containerd snapshotter and CNI settings for bot workspace containers.
snapshotter = "overlayfs"
data_root = "/opt/memoh/data"
runtime_dir = "/opt/memoh/runtime"

## Workspace containerd configuration
[containerd]
# Embedded containerd socket inside the memoh-server container.
socket_path = "/run/containerd/containerd.sock"
namespace = "default"

[docker]
# Used only when [container].backend = "docker"; the official Compose stack
# uses containerd above.
host = ""

[podman]
# Used only when [container].backend = "podman"; the official Compose stack
# uses containerd above.
host = "unix:///run/podman/podman.sock"

[local]
# Local workspaces are intended for trusted local deployments, not the default
# Docker Compose deployment. Keep disabled here because local commands run as
# the server process user without container isolation.
enabled = false
default_workspace_parent = "~/.memoh/workspaces"
metadata_root = ""
allow_absolute_paths = false

## Postgres configuration.
[postgres]
host = "postgres"
port = 5432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

## Qdrant configuration
[qdrant]
base_url = "http://qdrant:6334"
api_key = ""
timeout_seconds = 10

[sparse]
base_url = "http://sparse:8085"

## Browser Gateway
[browser_gateway]
host = "browser"
port = 8083
server_addr = "server:8080"

## External web-ui compatibility config
[web-ui]
host = "127.0.0.1"
port = 8082
