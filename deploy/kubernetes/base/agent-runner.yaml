apiVersion: v1
kind: Service
metadata:
  name: memoh-agent-runner
  namespace: memoh
spec:
  selector:
    app.kubernetes.io/name: memoh-agent-runner
  ports:
    - name: connect
      port: 26813
      targetPort: 26813
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoh-agent-runner
  namespace: memoh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memoh-agent-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoh-agent-runner
    spec:
      containers:
        - name: agent-runner
          image: ghcr.io/stringke/agent-runner:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MEMOH_AGENT_RUNNER_ADDR
              value: ":26813"
          ports:
            - name: connect
              containerPort: 26813
          readinessProbe:
            httpGet:
              path: /health
              port: 26813
            initialDelaySeconds: 10
            periodSeconds: 10
