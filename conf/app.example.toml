# Memoh configuration template
# Copy to config.toml and adjust values for your environment.
# For local development, use: cp deploy/config/dev/app.dev.toml config.toml

[log]
level = "info"
format = "text"

[server]
addr = ":26810"

[admin]
username = "admin"
password = "admin123"
email = "admin@memoh.local"

[auth]
jwt_secret = "CHANGE-ME-TO-A-RANDOM-SECRET"
jwt_expires_in = "168h"

timezone = "UTC"

[database]
# PostgreSQL is the only supported relational database backend.
driver = "postgres"

[container]
# Required. Select the workspace runtime backend.
# - containerd: direct containerd integration with CNI and snapshot support.
# - docker: host Docker Engine API, best for host/binary deployments where
#   workspace bind-mount source paths are valid on the Docker host.
# - kubernetes: create one Pod/PVC per bot workspace.
# - apple: macOS Apple Container backend via socktainer.
backend = "docker"
default_image = "debian:bookworm-slim"
# Workspace image pull policy: if_not_present, always, or never.
# Local backends apply it before creating the workspace; Kubernetes maps it to
# the Pod imagePullPolicy and lets the cluster perform the pull.
image_pull_policy = "if_not_present"
# containerd snapshotter name. Ignored by Docker and Kubernetes backends.
snapshotter = "overlayfs"
# Host/runtime data root for sockets, CNI state, overlay sidecars, and workspace metadata.
data_root = "data"
# CNI paths used by containerd-backed runtime networking.
cni_bin_dir = "/opt/cni/bin"
cni_conf_dir = "/etc/cni/net.d"

[containerd]
# Used when [container].backend = "containerd". The Docker Compose deployment
# starts an embedded containerd inside the server container at this socket.
socket_path = "/run/containerd/containerd.sock"
namespace = "default"

[docker]
# Used when [container].backend = "docker".
# Leave empty to use Docker's standard environment discovery (DOCKER_HOST,
# DOCKER_TLS_VERIFY, DOCKER_CERT_PATH, or the platform default socket).
host = ""

[kubernetes]
# Enable with [container].backend = "kubernetes".
# In-cluster mode uses the pod ServiceAccount; set kubeconfig for external control.
namespace = "default"
in_cluster = true
kubeconfig = ""
service_account_name = ""
image_pull_secret = ""
pvc_storage_class = ""
pvc_size = "10Gi"
bridge_port = 9090

[apple]
# Used when [container].backend = "apple". Leave empty to use socktainer defaults.
# socket_path = "/path/to/your/.socktainer/container.sock"
# binary_path = "/opt/homebrew/bin/socktainer"
socket_path = ""
binary_path = ""

[local]
# Enables local workspaces alongside the configured container backend. This is
# intended for trusted local deployments only: there is no sandbox, and commands run
# as the server process user on the host machine.
enabled = false
# Default parent used when a local bot does not provide an explicit workspace
# path. The final default is "$HOME/.memoh/workspaces/<bot-name>".
default_workspace_parent = "~/.memoh/workspaces"
# Metadata for local workspace records. Leave empty to store it under
# [container].data_root/local/containers.
metadata_root = ""
# When true, local workspace tools may read/write/execute using host absolute
# paths outside the bot's default workspace.
allow_absolute_paths = true

[postgres]
host = "127.0.0.1"
port = 26813
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[qdrant]
base_url = "http://127.0.0.1:26815"
api_key = ""
timeout_seconds = 10

[sparse]
base_url = "http://127.0.0.1:26816"

[registry]
providers_dir = "conf/providers"

[browser_gateway]
host = "127.0.0.1"
port = 26812
server_addr = ":26810"

[supermarket]
base_url = "https://supermarket.memoh.ai"

[web-ui]
host = "127.0.0.1"
port = 26811
