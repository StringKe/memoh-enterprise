syntax = "proto3";

package memoh.private.v1;

import "google/protobuf/struct.proto";
import "memoh/private/v1/common.proto";

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/private/v1;privatev1";

message Bot {
  string id = 1;
  string owner_user_id = 2;
  string group_id = 3;
  string display_name = 4;
  string avatar_url = 5;
  string timezone = 6;
  bool is_active = 7;
  string status = 8;
  string check_state = 9;
  int32 check_issue_count = 10;
  SettingsOverrideMask settings_override_mask = 11;
  google.protobuf.Struct metadata = 12;
  AuditFields audit = 13;
}

message CreateBotRequest {
  string display_name = 1;
  string group_id = 2;
  string avatar_url = 3;
  optional string timezone = 4;
  optional bool is_active = 5;
  string acl_preset = 6;
  google.protobuf.Struct metadata = 7;
}

message CreateBotResponse {
  Bot bot = 1;
}

message GetBotRequest {
  string id = 1;
}

message GetBotResponse {
  Bot bot = 1;
}

message ListBotsRequest {
  PageRequest page = 1;
}

message ListBotsResponse {
  repeated Bot bots = 1;
  PageResponse page = 2;
}

message UpdateBotRequest {
  string id = 1;
  optional string display_name = 2;
  optional string group_id = 3;
  optional string avatar_url = 4;
  optional string timezone = 5;
  optional bool is_active = 6;
  google.protobuf.Struct metadata = 7;
}

message UpdateBotResponse {
  Bot bot = 1;
}

message DeleteBotRequest {
  string id = 1;
}

message DeleteBotResponse {}

message BotCheck {
  string id = 1;
  string type = 2;
  string title_key = 3;
  string subtitle = 4;
  string status = 5;
  string summary = 6;
  string detail = 7;
  google.protobuf.Struct metadata = 8;
}

message ListBotChecksRequest {
  string bot_id = 1;
}

message ListBotChecksResponse {
  repeated BotCheck checks = 1;
}

message AssignBotGroupRequest {
  string bot_id = 1;
  string group_id = 2;
}

message AssignBotGroupResponse {
  Bot bot = 1;
}

message ClearBotGroupRequest {
  string bot_id = 1;
}

message ClearBotGroupResponse {
  Bot bot = 1;
}

service BotService {
  rpc CreateBot(CreateBotRequest) returns (CreateBotResponse);
  rpc GetBot(GetBotRequest) returns (GetBotResponse);
  rpc ListBots(ListBotsRequest) returns (ListBotsResponse);
  rpc UpdateBot(UpdateBotRequest) returns (UpdateBotResponse);
  rpc DeleteBot(DeleteBotRequest) returns (DeleteBotResponse);
  rpc ListBotChecks(ListBotChecksRequest) returns (ListBotChecksResponse);
  rpc AssignBotGroup(AssignBotGroupRequest) returns (AssignBotGroupResponse);
  rpc ClearBotGroup(ClearBotGroupRequest) returns (ClearBotGroupResponse);
}
