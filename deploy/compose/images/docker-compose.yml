name: "memoh"
services:
  migrate:
    image: ghcr.io/stringke/server:${SERVER_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.server
      args:
        - VERSION=${MEMOH_VERSION:-dev}
        - COMMIT_HASH=${MEMOH_COMMIT:-unknown}
        - BUILD_TIME=${MEMOH_BUILD_TIME:-unknown}

  server:
    image: ghcr.io/stringke/server:${SERVER_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.server
      args:
        - VERSION=${MEMOH_VERSION:-dev}
        - COMMIT_HASH=${MEMOH_COMMIT:-unknown}
        - BUILD_TIME=${MEMOH_BUILD_TIME:-unknown}

  agent-runner:
    image: ghcr.io/stringke/agent-runner:${AGENT_RUNNER_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.agent-runner
      args:
        - VERSION=${MEMOH_VERSION:-dev}
        - COMMIT_HASH=${MEMOH_COMMIT:-unknown}
        - BUILD_TIME=${MEMOH_BUILD_TIME:-unknown}

  connector:
    image: ghcr.io/stringke/connector:${CONNECTOR_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.connector
      args:
        - VERSION=${MEMOH_VERSION:-dev}
        - COMMIT_HASH=${MEMOH_COMMIT:-unknown}
        - BUILD_TIME=${MEMOH_BUILD_TIME:-unknown}

  integration-gateway:
    image: ghcr.io/stringke/integration-gateway:${INTEGRATION_GATEWAY_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.integration-gateway
      args:
        - VERSION=${MEMOH_VERSION:-dev}
        - COMMIT_HASH=${MEMOH_COMMIT:-unknown}
        - BUILD_TIME=${MEMOH_BUILD_TIME:-unknown}

  worker:
    image: ghcr.io/stringke/worker:${WORKER_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.worker
      args:
        - VERSION=${MEMOH_VERSION:-dev}
        - COMMIT_HASH=${MEMOH_COMMIT:-unknown}
        - BUILD_TIME=${MEMOH_BUILD_TIME:-unknown}

  web:
    image: ghcr.io/stringke/web:${WEB_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.web
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_CONNECT_URL=${VITE_CONNECT_URL:-/connect}

  sparse:
    image: ghcr.io/stringke/sparse:${SPARSE_TAG:-latest}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.sparse

  browser:
    image: ghcr.io/stringke/browser:${BROWSER_TAG:-local}
    build:
      context: ../../..
      dockerfile: deploy/docker/production/Dockerfile.browser
