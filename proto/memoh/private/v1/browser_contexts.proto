syntax = "proto3";

package memoh.private.v1;

import "google/protobuf/struct.proto";
import "memoh/private/v1/common.proto";

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/private/v1;privatev1";

message BrowserContext {
  string id = 1;
  string name = 2;
  string core = 3;
  bool enabled = 4;
  google.protobuf.Struct config = 5;
  AuditFields audit = 6;
}

message BrowserCore {
  string id = 1;
  string display_name = 2;
  google.protobuf.Struct metadata = 3;
}

message CreateBrowserContextRequest {
  string name = 1;
  string core = 2;
  bool enabled = 3;
  google.protobuf.Struct config = 4;
}

message CreateBrowserContextResponse {
  BrowserContext context = 1;
}

message ListBrowserContextsRequest {
  PageRequest page = 1;
}

message ListBrowserContextsResponse {
  repeated BrowserContext contexts = 1;
  PageResponse page = 2;
}

message GetBrowserContextRequest {
  string id = 1;
}

message GetBrowserContextResponse {
  BrowserContext context = 1;
}

message UpdateBrowserContextRequest {
  string id = 1;
  optional string name = 2;
  optional string core = 3;
  optional bool enabled = 4;
  google.protobuf.Struct config = 5;
}

message UpdateBrowserContextResponse {
  BrowserContext context = 1;
}

message DeleteBrowserContextRequest {
  string id = 1;
}

message DeleteBrowserContextResponse {}

message ListBrowserCoresRequest {}

message ListBrowserCoresResponse {
  repeated BrowserCore cores = 1;
}

service BrowserContextService {
  rpc CreateBrowserContext(CreateBrowserContextRequest) returns (CreateBrowserContextResponse);
  rpc ListBrowserContexts(ListBrowserContextsRequest) returns (ListBrowserContextsResponse);
  rpc GetBrowserContext(GetBrowserContextRequest) returns (GetBrowserContextResponse);
  rpc UpdateBrowserContext(UpdateBrowserContextRequest) returns (UpdateBrowserContextResponse);
  rpc DeleteBrowserContext(DeleteBrowserContextRequest) returns (DeleteBrowserContextResponse);
  rpc ListBrowserCores(ListBrowserCoresRequest) returns (ListBrowserCoresResponse);
}
