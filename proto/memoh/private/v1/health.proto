syntax = "proto3";

package memoh.private.v1;

option go_package = "github.com/memohai/memoh/internal/connectapi/gen/memoh/private/v1;privatev1";

message PingRequest {}

message PingResponse {
  string status = 1;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

service HealthService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}
