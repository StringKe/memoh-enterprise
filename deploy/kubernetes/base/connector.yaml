apiVersion: apps/v1
kind: Deployment
metadata:
  name: memoh-connector-local
  namespace: memoh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memoh-connector-local
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memoh-connector-local
    spec:
      containers:
        - name: connector
          image: ghcr.io/stringke/connector:latest
          imagePullPolicy: IfNotPresent
          args: ["--channel", "local"]
